# Daily detector: Stale PRs (W15).
# Runs daily at 20:00 UTC. Uses GitHub GraphQL to list every open PR per repo
# and flags ones untouched for >7 days (drafts included). No checkout needed.
# Posts a rolling Linear issue per repo under Code Health. Signature:
# [stale-prs:<repo>]. Auto-closes via G1 when queue drains for 3 days.

name: Detector — Stale PRs (daily)

on:
  schedule:
    - cron: '0 20 * * *' # 20:00 UTC = 13:00 PDT
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - sleep_test_scheduler
          - WakewellWeb
          - wakewell-hq
          - 5dsmiles-dashboard
          - treatment-hub
          - aria-slack-bot
          - claude-skills-ecosystem
    steps:
      - name: Checkout routines-hub
        uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Scan stale PRs
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.REPO_READ_TOKEN }}
          TARGET_REPO: ${{ matrix.repo }}
        run: node scripts/detectors/stale-prs.mjs
