# Daily detector: Dead code via knip (W7).
# Runs daily at 16:30 UTC, matrix across canonical repos. Parses knip JSON
# and posts a rolling Linear issue per repo under Code Health. Signature:
# [dead-code:<repo>]. Auto-closes via G1 when cleared.

name: Detector — Dead Code (daily)

on:
  schedule:
    - cron: '30 16 * * *' # 16:30 UTC = 09:30 PDT
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - sleep_test_scheduler
          - WakewellWeb
          - wakewell-hq
          - 5dsmiles-dashboard
          - treatment-hub
          - aria-slack-bot
          - claude-skills-ecosystem
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v6
        with:
          repository: Wakewell-Sleep-Solutions/${{ matrix.repo }}
          token: ${{ secrets.REPO_READ_TOKEN }}
          path: target

      - name: Skip if no package.json
        id: check
        run: |
          if [ -f target/package.json ]; then
            echo "has_package=true" >> $GITHUB_OUTPUT
          else
            echo "has_package=false" >> $GITHUB_OUTPUT
            echo "::notice::${{ matrix.repo }} has no package.json — skipping"
          fi

      - name: Checkout routines-hub
        if: steps.check.outputs.has_package == 'true'
        uses: actions/checkout@v6
        with:
          path: .routines-hub

      - name: Use Node 22
        if: steps.check.outputs.has_package == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install deps (for accurate knip analysis)
        if: steps.check.outputs.has_package == 'true'
        working-directory: target
        run: |
          npm ci --ignore-scripts --no-audit --no-fund --legacy-peer-deps \
          || npm install --ignore-scripts --no-audit --no-fund --legacy-peer-deps

      - name: Run knip
        if: steps.check.outputs.has_package == 'true'
        working-directory: target
        continue-on-error: true
        run: |
          npx --yes knip@latest --no-exit-code --reporter json > ../knip.json 2>/dev/null \
            || echo '{}' > ../knip.json

      - name: Process findings
        if: steps.check.outputs.has_package == 'true'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          TARGET_REPO: ${{ matrix.repo }}
          KNIP_JSON: ${{ github.workspace }}/knip.json
        working-directory: .routines-hub
        run: node scripts/detectors/dead-code.mjs
