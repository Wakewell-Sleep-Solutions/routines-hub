# Daily detector: Agent Zombies (W21).
# Runs daily at 20:45 UTC. Scans Linear workspace for `claude-task` issues
# stalled In Progress >4h with no PR attachment. Cross-repo (no matrix) —
# posts one rolling meta-issue under Prod Health. Signature: [agent-zombies].
# G1 groomer eventually closes stale instances via the >14d no-update check.

name: Detector — Agent Zombies (daily)

on:
  schedule:
    - cron: '45 20 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Scan agent zombies
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: node scripts/detectors/agent-zombie.mjs
