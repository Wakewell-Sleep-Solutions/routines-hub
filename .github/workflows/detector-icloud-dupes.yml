# Daily detector: iCloud-dupes (W22).
# Runs daily at 21:15 UTC, matrix across all canonical repos. Scans the
# target repo's git index for files/dirs with a " N" iCloud-sync suffix
# (e.g. `routes 2.ts`, `.claude 2/config.json`) and posts a rolling
# Linear issue per repo under Code Health. Signature: [icloud-dupes:<repo>].
# Auto-closes via G1 when cleared for 3d.

name: Detector — iCloud Dupes (daily)

on:
  schedule:
    - cron: '15 21 * * *' # 21:15 UTC = 14:15 PDT
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - sleep_test_scheduler
          - WakewellWeb
          - wakewell-hq
          - 5dsmiles-dashboard
          - treatment-hub
          - aria-slack-bot
          - claude-skills-ecosystem
          - routines-hub
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: Wakewell-Sleep-Solutions/${{ matrix.repo }}
          token: ${{ secrets.REPO_READ_TOKEN }}
          path: target

      - name: Checkout routines-hub
        uses: actions/checkout@v4
        with:
          path: .routines-hub

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Scan for iCloud dupes
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          TARGET_REPO: ${{ matrix.repo }}
          TARGET_DIR: ${{ github.workspace }}/target
        working-directory: .routines-hub
        run: node scripts/detectors/icloud-dupes.mjs
