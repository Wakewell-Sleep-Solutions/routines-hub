# Weekly detector: Cognitive & Cyclomatic Complexity (W23).
# Runs Monday at 22:00 UTC, matrix across canonical repos. SonarQube-parity
# scan for the "Intentional / Adaptable" Clean Code attributes — per-function
# cognitive complexity (eslint-plugin-sonarjs), cyclomatic complexity / LOC /
# params (typhonjs-escomplex). Posts a rolling Linear issue per repo under
# Code Health. Signature: [complexity:<repo>]. Auto-closes via G1 when clear.

name: Detector — Complexity (weekly)

on:
  schedule:
    - cron: '0 22 * * 1' # Monday 22:00 UTC
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - sleep_test_scheduler
          - WakewellWeb
          - wakewell-hq
          - 5dsmiles-dashboard
          - treatment-hub
          - routines-hub
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: Wakewell-Sleep-Solutions/${{ matrix.repo }}
          token: ${{ secrets.REPO_READ_TOKEN }}
          path: target

      - name: Checkout routines-hub
        uses: actions/checkout@v4
        with:
          path: .routines-hub

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install routines-hub dependencies (typhonjs-escomplex, eslint-plugin-sonarjs, …)
        working-directory: .routines-hub
        run: npm install --no-audit --no-fund

      - name: Scan complexity
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          TARGET_REPO: ${{ matrix.repo }}
          TARGET_DIR: ${{ github.workspace }}/target
        working-directory: .routines-hub
        run: node scripts/detectors/complexity.mjs
