# Daily detector: Full-history secrets via gitleaks (W13).
# Runs daily at 19:00 UTC, matrix across canonical repos. Uses gitleaks with
# full git log (fetch-depth: 0) to catch secrets that were committed then
# deleted but still live in git history forever. Posts a rolling Linear issue
# per repo under Security Hygiene. Signature: [secrets-history:<repo>].
# Auto-closes via G1 when cleared for 3 days.

name: Detector — Secrets History (daily)

on:
  schedule:
    - cron: '0 19 * * *' # 19:00 UTC = 12:00 PDT
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - sleep_test_scheduler
          - WakewellWeb
          - wakewell-hq
          - 5dsmiles-dashboard
          - treatment-hub
          - aria-slack-bot
          - claude-skills-ecosystem
    steps:
      - name: Checkout target repo (full history)
        uses: actions/checkout@v6
        with:
          repository: Wakewell-Sleep-Solutions/${{ matrix.repo }}
          token: ${{ secrets.REPO_READ_TOKEN }}
          path: target
          fetch-depth: 0

      - name: Checkout routines-hub
        uses: actions/checkout@v6
        with:
          path: .routines-hub

      - name: Use Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install gitleaks
        run: |
          VERSION=8.25.0
          wget -qO /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks (redacted JSON report)
        working-directory: target
        continue-on-error: true
        run: |
          gitleaks detect \
            --source . \
            --config ${{ github.workspace }}/.routines-hub/scripts/detectors/gitleaks.toml \
            --report-format json \
            --report-path ../gitleaks.json \
            --redact \
            --no-banner \
            --exit-code 0

      - name: Process findings
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          TARGET_REPO: ${{ matrix.repo }}
          GITLEAKS_JSON: ${{ github.workspace }}/gitleaks.json
        working-directory: .routines-hub
        run: node scripts/detectors/secrets-history.mjs
