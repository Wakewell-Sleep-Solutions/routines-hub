# Daily detector: Deploy Drift (W20).
# Runs daily at 20:30 UTC (staggered from the 20:00 block to spread API load).
# For each repo, fetches /healthz to read the running SHA and compares against
# the default branch's HEAD on GitHub. Opens/heartbeats a rolling Linear issue
# per repo under Prod Health. Signature: [deploy-drift:<repo>].
# Auto-closes via G1 when drift clears for 3 days.

name: Detector — Deploy Drift (daily)

on:
  schedule:
    - cron: '30 20 * * *' # 20:30 UTC = 13:30 PDT
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - WakewellWeb
          - sleep_test_scheduler
          - wakewell-hq
          - treatment-hub
          - 5dsmiles-dashboard
    steps:
      - name: Checkout routines-hub
        uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Scan deploy drift
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.REPO_READ_TOKEN }}
          TARGET_REPO: ${{ matrix.repo }}
        run: node scripts/detectors/deploy-drift.mjs
