# Daily detector: Malicious Packages via OSV-Scanner (W27).
# Runs daily at 05:00 UTC (supply chain threats move fast — earliest slot in
# the detector fleet). For each repo with a recognized lockfile, runs
# Google's osv-scanner to cross-reference deps against the OSV database
# (OpenSSF Malicious Packages + GHSA + npm advisories + PyPI advisories).
# Posts a rolling Linear issue per repo under Security Hygiene.
# Signature: [malicious-packages:<repo>]. Auto-closes via G1 when clear for 3d.

name: Detector — Malicious Packages (daily)

on:
  schedule:
    - cron: '0 5 * * *' # 05:00 UTC = 22:00 PDT previous day, earliest slot
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - sleep_test_scheduler
          - WakewellWeb
          - wakewell-hq
          - 5dsmiles-dashboard
          - treatment-hub
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: Wakewell-Sleep-Solutions/${{ matrix.repo }}
          token: ${{ secrets.REPO_READ_TOKEN }}
          path: target

      - name: Checkout routines-hub
        uses: actions/checkout@v4
        with:
          path: .routines-hub

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install osv-scanner
        id: osv
        run: |
          # Pin-less: latest stable. OSV-Scanner has no breaking changes in
          # its JSON schema; Google maintains output compatibility.
          curl -sL -o /tmp/osv-scanner \
            https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64
          chmod +x /tmp/osv-scanner
          sudo mv /tmp/osv-scanner /usr/local/bin/osv-scanner
          VERSION=$(osv-scanner --version | head -1 | awk '{print $NF}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "osv-scanner version: ${VERSION}"

      - name: Detect lockfiles
        id: lockfiles
        working-directory: target
        run: |
          # Build the --lockfile flag list from whatever actually exists.
          # osv-scanner errors hard if you pass a missing lockfile, so we
          # only pass ones that are present.
          FLAGS=""
          for f in package-lock.json yarn.lock pnpm-lock.yaml poetry.lock requirements.txt Pipfile.lock Gemfile.lock go.sum; do
            if [ -f "$f" ]; then
              FLAGS="$FLAGS --lockfile=$f"
            fi
          done
          echo "flags=$FLAGS" >> $GITHUB_OUTPUT
          if [ -z "$FLAGS" ]; then
            echo "::notice::${{ matrix.repo }} has no recognized lockfile — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run osv-scanner
        if: steps.lockfiles.outputs.skip == 'false'
        working-directory: target
        # Exit 0 even when vulns found — we need the JSON, not the exit code.
        # stderr carries the "Scanning dir" banner which we route to a
        # separate file to keep stdout JSON clean.
        run: |
          set +e
          osv-scanner scan source \
            --format json \
            ${{ steps.lockfiles.outputs.flags }} \
            . \
            > ${{ github.workspace }}/osv.json \
            2> ${{ github.workspace }}/osv.err
          RC=$?
          echo "osv-scanner exit=${RC} (non-zero expected when findings exist)"
          echo "--- stderr ---"
          cat ${{ github.workspace }}/osv.err || true
          echo "--- json head ---"
          head -c 400 ${{ github.workspace }}/osv.json || true

      - name: Process findings
        if: steps.lockfiles.outputs.skip == 'false'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          TARGET_REPO: ${{ matrix.repo }}
          TARGET_DIR: ${{ github.workspace }}/target
          OSV_JSON: ${{ github.workspace }}/osv.json
          OSV_VERSION: ${{ steps.osv.outputs.version }}
        working-directory: .routines-hub
        run: node scripts/detectors/malicious-packages.mjs
