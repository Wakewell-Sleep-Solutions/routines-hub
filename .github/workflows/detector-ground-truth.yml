# Daily Linear Ground Truth Verifier (W11)
# Scans open "In Progress" Linear issues with acceptance-criteria checkboxes,
# searches the canonical repos for evidence of implementation, posts a
# verification comment per issue, and creates [verify-gap:...] sub-issues in
# Ops / Linear Ground Truth for any AC without evidence.
#
# Runs daily at 22:00 UTC (before US standup next day).

name: Detector — Ground Truth Verifier (daily)

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log only, no Linear writes)'
        type: boolean
        default: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run ground truth scan
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.REPO_READ_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: node scripts/detectors/ground-truth.mjs
